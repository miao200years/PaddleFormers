### data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ./data/sft/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./data/sft/eval.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 8192
mix_strategy: concat

### model
model_name_or_path: /root/paddlejob/gpfs/efficient_benchmark/huggingface/GLM-4.5-Air
attn_impl: flashmask

### finetuning
# base
stage: SFT
fine_tuning: full
seed: 23
do_train: true
do_eval: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
max_steps: 100
eval_iters: 10
eval_steps: 100
evaluation_strategy: steps
save_steps: 100
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 8
logging_dir: ./vdl_log
output_dir: ./checkpoints/qwen3_hf_0p6b_sft_ckpts
disable_tqdm: true
eval_accumulation_steps: 16

# train
warmup_steps: 20
learning_rate: 1.0e-5
random_shuffle: false

# performance
tensor_model_parallel_size: 4
pipeline_model_parallel_size: 4
use_expert_parallel: true
expert_model_parallel_size: 8
sequence_parallel: true

# sharding_parallel_config
split_param: true

amp_master_grad: true
#sharding_parallel_size: 8
sharding: stage1
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
bf16: true
fp16_opt_level: O2
# unified_checkpoint: true
load_via_cpu: true
# resume_from_checkpoint: false
save_checkpoint_format : "flex_checkpoint"
load_checkpoint_format : "flex_checkpoint"
save_to_hf: true

benchmark: true
num_empty_layers_add_in_head: 1
num_empty_layers_add_in_tail: 1
continue_training: false
