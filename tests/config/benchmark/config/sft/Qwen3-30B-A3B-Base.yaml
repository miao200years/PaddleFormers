## data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ./data/sft/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./data/sft/eval.jsonl
eval_dataset_prob: "1.0"

# dataset_type: "pretrain"
# input_dir: "1.0 xuxinyi/PaddleFormers/data/pre-training/llama_openwebtext_100k"
# split: "998,1,1"

eval_iters: 10

max_seq_len: 4096
num_samples_each_epoch: 6000000
packing: true
mix_strategy: concat

### model
model_name_or_path: Qwen/Qwen3-30B-A3B-Base
attn_impl: flashmask

### finetuning
# base
stage: SFT
fine_tuning: full
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 5
max_steps: 50
eval_steps: 100
evaluation_strategy: steps
save_steps: 10000
save_total_limit: 1
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 64
logging_dir: ./log_32cards
output_dir: ./checkpoints/qwen3_hf_30b_sft_ckpts_parallel
disable_tqdm: true
eval_accumulation_steps: 16

# train
warmup_steps: 20
learning_rate: 1.0e-5

# performance
recompute_granularity: ""
apply_rope_fusion: true
moe_router_fusion: false
moe_router_force_load_balancing: true
moe_grouped_gemm: true

sharding: "stage1"
split_param: true
tensor_model_parallel_size: 1
sequence_parallel: true
pipeline_model_parallel_size: 2
use_expert_parallel: true
expert_model_parallel_size: 8

optim: adamw
bf16: true
fp16_opt_level: O2
amp_master_grad: true
fuse_attention_qkv: true
fuse_attention_ffn: true
fuse_swiglu: true
fuse_rms_norm: true
fuse_linear: true
use_paddlefleet: true

# unified_checkpoint: false
save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"

benchmark: true